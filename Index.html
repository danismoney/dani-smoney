  <style>

<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ══════════════════════════════════════════
// CONFIG — שים את ה-keys שלך כאן
// ══════════════════════════════════════════
const ANTHROPIC_KEY = “YOUR_ANTHROPIC_KEY_HERE”;
const FINNHUB_KEY   = “YOUR_FINNHUB_KEY_HERE”; // הירשם חינם ב-finnhub.io

// ══════════════════════════════════════════
// LIVE PRICE — Finnhub (CORS פתוח, חינמי)
// ══════════════════════════════════════════
async function fetchLivePrice(ticker) {
try {
const r = await fetch(
`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`,
{ signal: AbortSignal.timeout(5000) }
);
if (!r.ok) return null;
const d = await r.json();
if (d.c && d.c > 0) return { price: d.c, change: d.dp ?? 0 };
} catch {}
return null;
}

// ══════════════════════════════════════════
// AI
// ══════════════════════════════════════════
async function callClaude(prompt) {
const r = await fetch(“https://api.anthropic.com/v1/messages”, {
method: “POST”,
headers: {
“Content-Type”: “application/json”,
“x-api-key”: ANTHROPIC_KEY,
“anthropic-version”: “2023-06-01”,
“anthropic-dangerous-direct-browser-access”: “true”
},
body: JSON.stringify({
model: “claude-sonnet-4-20250514”,
max_tokens: 800,
messages: [{ role: “user”, content: prompt }],
}),
});
const d = await r.json();
return d.content?.[0]?.text || “”;
}

// ══════════════════════════════════════════
// TYPEWRITER
// ══════════════════════════════════════════
function useTypewriter() {
const [text, setText] = useState(””);
const [going, setGoing] = useState(false);
const iv = useRef(null);
const play = useCallback((full) => {
clearInterval(iv.current);
setText(””); setGoing(true);
let i = 0;
iv.current = setInterval(() => {
i += 3;
if (i >= full.length) { setText(full); setGoing(false); clearInterval(iv.current); }
else setText(full.slice(0, i));
}, 18);
}, []);
useEffect(() => () => clearInterval(iv.current), []);
return { text, going, play };
}

// ══════════════════════════════════════════
// CANDLE / RSI
// ══════════════════════════════════════════
function seededRand(seed) {
let s = seed;
return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}
function generateCandles(ticker, basePrice, days = 60) {
const hash = ticker.split(””).reduce((a, c) => a + c.charCodeAt(0), 0);
const rand = seededRand(hash * 997);
const out = []; let price = basePrice * (0.86 + rand() * 0.05);
for (let i = 0; i < days; i++) {
const vol = 0.013 + rand() * 0.022, open = price;
const close = open * (1 + (rand() - 0.465) * vol);
out.push({ open, close, high: Math.max(open,close)*(1+rand()*0.008), low: Math.min(open,close)*(1-rand()*0.008) });
price = close;
}
return out;
}
function calcSMA(c,p){return c.map((*,i)=>i<p-1?null:c.slice(i-p+1,i+1).reduce((a,x)=>a+x.close,0)/p);}
function calcRSI(c,p=14){
const g=[],l=[];
for(let i=1;i<c.length;i++){const d=c[i].close-c[i-1].close;g.push(d>0?d:0);l.push(d<0?-d:0);}
return c.map((*,i)=>{if(i<p)return null;const gv=g.slice(i-p,i).reduce((a,b)=>a+b,0)/p,lv=l.slice(i-p,i).reduce((a,b)=>a+b,0)/p;return lv===0?100:100-100/(1+gv/lv);});
}
function findLevels(c){return{resistance:Math.max(…c.slice(-30).map(x=>x.high)),support:Math.min(…c.slice(-30).map(x=>x.low))};}

function CandleChart({ candles, currentPrice }) {
const svgRef=useRef(null);const[tip,setTip]=useState(null);
const W=560,H=200,P={t:10,r:44,b:26,l:50},cw=W-P.l-P.r,ch=H-P.t-P.b;
const allP=candles.flatMap(c=>[c.high,c.low]),minP=Math.min(…allP)*0.997,maxP=Math.max(…allP)*1.003,rng=maxP-minP;
const toX=i=>P.l+(i/(candles.length-1))*cw,toY=p=>P.t+ch-((p-minP)/rng)*ch;
const sma20=calcSMA(candles,20),sma50=calcSMA(candles,50),lvl=findLevels(candles);
const bw=Math.max(2,(cw/candles.length)*0.65);
const mkPath=sma=>sma.map((v,i)=>v===null?””:`${i===sma.findIndex(x=>x!==null)?"M":"L"}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(” “);
const gridPs=Array.from({length:5},(_,i)=>minP+(rng*i)/4);
const months=[“ינו”,“פבר”,“מרץ”,“אפר”,“מאי”,“יונ”,“יול”,“אוג”,“ספט”,“אוק”,“נוב”,“דצ”];
const now=new Date(),xLbls=[0,15,30,45,59].map(i=>{const d=new Date(now);d.setDate(d.getDate()-(59-i));return{i,label:`${d.getDate()} ${months[d.getMonth()]}`};});
const lc=candles[candles.length-1].close,breakout=lc>lvl.resistance*0.999,breakdown=lc<lvl.support*1.001;
return(
<div>
<div style={{display:“flex”,gap:“8px”,flexWrap:“wrap”,marginBottom:“6px”,alignItems:“center”}}>
{[{color:”#63b3ed”,label:“SMA20”},{color:”#f6ad55”,label:“SMA50”},{color:“rgba(252,129,129,0.8)”,label:“התנגדות”,dash:true},{color:“rgba(104,211,145,0.8)”,label:“תמיכה”,dash:true}].map(l=>(
<div key={l.label} style={{display:“flex”,alignItems:“center”,gap:“3px”}}>
<svg width="12" height="8"><line x1=“0” y1=“4” x2=“12” y2=“4” stroke={l.color} strokeWidth=“1.5” strokeDasharray={l.dash?“4,3”:“none”}/></svg>
<span style={{fontSize:“10px”,color:“rgba(255,255,255,0.4)”}}>{l.label}</span>
</div>
))}
{(breakout||breakdown)&&<span style={{fontSize:“10px”,fontWeight:“700”,color:breakout?”#68d391”:”#fc8181”,background:breakout?“rgba(104,211,145,0.1)”:“rgba(252,129,129,0.1)”,padding:“2px 7px”,borderRadius:“6px”}}>{breakout?“⚡ פריצה!”:“⚠️ שבירה!”}</span>}
</div>
<svg ref={svgRef} width=“100%” viewBox={`0 0 ${W} ${H}`} style={{overflow:“visible”,cursor:“crosshair”}}
onMouseMove={e=>{const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width);const idx=Math.round(((mx-P.l)/cw)*(candles.length-1));if(idx>=0&&idx<candles.length){const c=candles[idx];setTip({idx,…c,x:mx,y:toY(c.close)});}}}
onMouseLeave={()=>setTip(null)}>
{gridPs.map((p,i)=><g key={i}><line x1={P.l} y1={toY(p)} x2={W-P.r} y2={toY(p)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/><text x={P.l-4} y={toY(p)+4} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.25)" fontFamily="monospace">{p>=1000?`${(p/1000).toFixed(1)}K`:p.toFixed(2)}</text></g>)}
{xLbls.map(({i,l})=><text key={i} x={toX(i)} y={H-4} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.25)">{l}</text>)}
<line x1={P.l} y1={toY(lvl.resistance)} x2={W-P.r} y2={toY(lvl.resistance)} stroke="rgba(252,129,129,0.6)" strokeWidth="1" strokeDasharray="5,4"/>
<text x={W-P.r+3} y={toY(lvl.resistance)+4} fontSize="8" fill="rgba(252,129,129,0.7)" fontFamily="monospace">{lvl.resistance.toFixed(2)}</text>
<line x1={P.l} y1={toY(lvl.support)} x2={W-P.r} y2={toY(lvl.support)} stroke="rgba(104,211,145,0.6)" strokeWidth="1" strokeDasharray="5,4"/>
<text x={W-P.r+3} y={toY(lvl.support)+4} fontSize="8" fill="rgba(104,211,145,0.7)" fontFamily="monospace">{lvl.support.toFixed(2)}</text>
{candles.map((c,i)=>{const x=toX(i),isUp=c.close>=c.open,color=isUp?”#68d391”:”#fc8181”;return(<g key={i}><line x1={x} y1={toY(c.high)} x2={x} y2={toY(c.low)} stroke={color} strokeWidth="0.8" opacity="0.8"/><rect x={x-bw/2} y={toY(Math.max(c.open,c.close))} width={bw} height={Math.max(1.5,Math.abs(toY(c.open)-toY(c.close)))} fill={color} opacity={tip&&tip.idx===i?1:0.82}/></g>);})}
<path d={mkPath(sma20)} fill="none" stroke="#63b3ed" strokeWidth="1.5" opacity="0.85"/>
<path d={mkPath(sma50)} fill="none" stroke="#f6ad55" strokeWidth="1.5" opacity="0.85"/>
<line x1={P.l} y1={toY(currentPrice)} x2={W-P.r} y2={toY(currentPrice)} stroke="rgba(255,255,255,0.25)" strokeWidth="1" strokeDasharray="3,3"/>
{tip&&(<g>
<line x1={toX(tip.idx)} y1={P.t} x2={toX(tip.idx)} y2={H-P.b} stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="3,3"/>
<circle cx={toX(tip.idx)} cy={toY(tip.close)} r="3" fill="#63b3ed"/>
<rect x={Math.min(toX(tip.idx)+6,W-100)} y={tip.y-38} width="90" height="50" rx="5" fill="rgba(10,15,26,0.95)" stroke="rgba(99,179,237,0.3)" strokeWidth="1"/>
<text x={Math.min(toX(tip.idx)+10,W-96)} y={tip.y-22} fontSize="9" fill="rgba(255,255,255,0.5)" fontFamily="monospace">פתיחה: {tip.open.toFixed(2)}</text>
<text x={Math.min(toX(tip.idx)+10,W-96)} y={tip.y-11} fontSize="9" fill="rgba(255,255,255,0.5)" fontFamily="monospace">סגירה: {tip.close.toFixed(2)}</text>
<text x={Math.min(toX(tip.idx)+10,W-96)} y={tip.y+1} fontSize="9" fill={tip.close>=tip.open?”#68d391”:”#fc8181”} fontFamily=“monospace”>{tip.close>=tip.open?“▲”:“▼”} {Math.abs((tip.close-tip.open)/tip.open*100).toFixed(2)}%</text>
</g>)}
</svg>
</div>
);
}

function RSIChart({ candles }) {
const W=560,H=52,P={t:4,r:44,b:16,l:50},cw=W-P.l-P.r,ch=H-P.t-P.b;
const rsis=calcRSI(candles),toX=i=>P.l+(i/(candles.length-1))*cw,toY=v=>P.t+ch-(v/100)*ch;
const path=rsis.map((v,i)=>v===null?””:`${i===rsis.findIndex(x=>x!==null)?"M":"L"}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(” “);
const last=rsis.filter(Boolean).pop()||50,col=last>70?”#fc8181”:last<30?”#68d391”:”#63b3ed”;
return(
<div style={{marginTop:“4px”}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:“3px”}}>
<span style={{fontSize:“10px”,color:“rgba(255,255,255,0.3)”}}>RSI (14)</span>
<span style={{fontSize:“11px”,fontWeight:“700”,color:col,fontFamily:“monospace”}}>{last.toFixed(1)} {last>70?”— קנוי יתר”:last<30?”— מכור יתר”:”— נייטרל”}</span>
</div>
<svg width=“100%” viewBox={`0 0 ${W} ${H}`}>
{[70,50,30].map(v=><g key={v}><line x1={P.l} y1={toY(v)} x2={W-P.r} y2={toY(v)} stroke={v===50?“rgba(255,255,255,0.06)”:v===70?“rgba(252,129,129,0.2)”:“rgba(104,211,145,0.2)”} strokeWidth=“1” strokeDasharray={v!==50?“4,3”:“none”}/><text x={P.l-4} y={toY(v)+3} textAnchor="end" fontSize="8" fill="rgba(255,255,255,0.2)" fontFamily="monospace">{v}</text></g>)}
<path d={path} fill="none" stroke={col} strokeWidth="1.5" opacity="0.9"/>
</svg>
</div>
);
}

// ══════════════════════════════════════════
// CHART PANEL
// ══════════════════════════════════════════
function ChartPanel({ stock, onClose }) {
const { text, going, play } = useTypewriter();
const [loading, setLoading] = useState(false);
const [live, setLive] = useState(null);
const [liveLoading, setLiveLoading] = useState(true);

useEffect(() => {
fetchLivePrice(stock.ticker).then(d => { setLive(d); setLiveLoading(false); });
}, [stock.ticker]);

const price = live?.price ?? stock.price;
const change = live?.change ?? stock.change;
const candles = generateCandles(stock.ticker, price);
const lvl = findLevels(candles);
const sma20 = calcSMA(candles,20), sma50 = calcSMA(candles,50);
const lastRsi = calcRSI(candles).filter(Boolean).pop()||50;

const runAnalysis = useCallback(async () => {
setLoading(true);
try {
const r = await callClaude(`נתח ${stock.ticker} בעברית:\nמחיר: $${price.toFixed(2)}, שינוי: ${change.toFixed(2)}%\nתמיכה: $${lvl.support.toFixed(2)}, התנגדות: $${lvl.resistance.toFixed(2)}\nSMA20: $${sma20[sma20.length-1]?.toFixed(2)}, RSI: ${lastRsi.toFixed(1)}\n3 פסקאות, ללא כוכביות: מצב מחיר, אינדיקטורים, תרחיש מסחר`);
play(r);
} catch { play(“שגיאה.”); }
setLoading(false);
}, [stock.ticker, price]);

useEffect(() => { if (!liveLoading) runAnalysis(); }, [liveLoading]);
const busy = loading || going;

return (
<div dir=“rtl” style={{position:“fixed”,top:0,right:0,height:“100vh”,width:“min(660px,100vw)”,background:”#080e1a”,borderLeft:“1px solid rgba(99,179,237,0.18)”,display:“flex”,flexDirection:“column”,zIndex:300,animation:“slideIn 0.3s ease”,boxShadow:”-24px 0 64px rgba(0,0,0,0.7)”,paddingTop:“calc(var(–sat) + 0px)”}}>
<div style={{padding:“14px 18px”,borderBottom:“1px solid rgba(255,255,255,0.06)”,display:“flex”,justifyContent:“space-between”,alignItems:“center”,flexShrink:0,marginTop:“8px”}}>
<div style={{display:“flex”,alignItems:“center”,gap:“10px”}}>
<span style={{fontFamily:“monospace”,fontSize:“18px”,fontWeight:“700”,color:”#63b3ed”}}>{stock.ticker}</span>
<span style={{fontSize:“11px”,color:“rgba(255,255,255,0.4)”}}>{stock.name}</span>
{!liveLoading && <span style={{fontSize:“13px”,fontWeight:“700”,color:change>=0?”#68d391”:”#fc8181”,fontFamily:“monospace”}}>{change>=0?“▲”:“▼”}{Math.abs(change).toFixed(2)}%</span>}
{live && <span style={{fontSize:“9px”,color:”#68d391”,background:“rgba(104,211,145,0.1)”,padding:“2px 6px”,borderRadius:“4px”}}>🔴 LIVE</span>}
</div>
<button onClick={onClose} style={{background:“rgba(255,255,255,0.08)”,border:“1px solid rgba(255,255,255,0.15)”,color:“rgba(255,255,255,0.7)”,cursor:“pointer”,padding:“6px 14px”,borderRadius:“8px”,fontSize:“14px”,fontWeight:“600”}}>✕ סגור</button>
</div>
<div style={{flex:1,overflowY:“auto”,padding:“14px 16px”}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:“8px”,marginBottom:“12px”}}>
{[{label:“תמיכה”,val:`$${lvl.support.toFixed(2)}`,color:”#68d391”},{label:“מחיר”,val:`$${price.toLocaleString()}`,color:”#f7fafc”},{label:“התנגדות”,val:`$${lvl.resistance.toFixed(2)}`,color:”#fc8181”}].map(x=>(
<div key={x.label} style={{background:“rgba(255,255,255,0.03)”,border:“1px solid rgba(255,255,255,0.07)”,borderRadius:“9px”,padding:“9px”,textAlign:“center”}}>
<div style={{fontSize:“9px”,color:“rgba(255,255,255,0.3)”,marginBottom:“3px”}}>{x.label}</div>
<div style={{fontSize:“14px”,fontWeight:“700”,color:x.color,fontFamily:“monospace”}}>{x.val}</div>
</div>
))}
</div>
<div style={{background:“rgba(0,0,0,0.35)”,borderRadius:“10px”,padding:“12px”,marginBottom:“8px”,border:“1px solid rgba(255,255,255,0.05)”}}>
<CandleChart candles={candles} currentPrice={price}/>
</div>
<div style={{background:“rgba(0,0,0,0.35)”,borderRadius:“10px”,padding:“10px 12px”,marginBottom:“12px”,border:“1px solid rgba(255,255,255,0.05)”}}>
<RSIChart candles={candles}/>
</div>
<div style={{background:“rgba(99,179,237,0.04)”,border:“1px solid rgba(99,179,237,0.15)”,borderRadius:“10px”,padding:“14px”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:“10px”}}>
<div style={{display:“flex”,alignItems:“center”,gap:“7px”}}>
<div style={{width:“6px”,height:“6px”,borderRadius:“50%”,background:”#63b3ed”,animation:busy?“pulse 1s infinite”:“none”}}/>
<span style={{fontSize:“11px”,color:”#63b3ed”,fontWeight:“600”}}>ניתוח AI {busy&&<span style={{fontSize:“9px”,opacity:0.5}}>• כותב…</span>}</span>
</div>
<button onClick={runAnalysis} disabled={busy} style={{background:“rgba(99,179,237,0.1)”,border:“1px solid rgba(99,179,237,0.2)”,borderRadius:“6px”,color:”#63b3ed”,fontSize:“11px”,padding:“3px 8px”,cursor:busy?“not-allowed”:“pointer”,opacity:busy?0.5:1}}>{busy?”…”:“🔄”}</button>
</div>
<div style={{fontSize:“13px”,lineHeight:“1.9”,color:“rgba(255,255,255,0.78)”,textAlign:“right”,minHeight:“50px”,whiteSpace:“pre-wrap”}}>
{loading&&!text&&<span style={{color:“rgba(255,255,255,0.25)”,fontStyle:“italic”}}>AI מנתח…</span>}
{text}
{going&&<span style={{display:“inline-block”,width:“2px”,height:“1em”,background:”#63b3ed”,marginRight:“2px”,verticalAlign:“text-bottom”,animation:“blink 0.7s step-end infinite”}}/>}
</div>
</div>
</div>
</div>
);
}

// ══════════════════════════════════════════
// PORTFOLIO — עם היסטוריית קניות מרובות
// ══════════════════════════════════════════

const EMPTY_LOT = { ticker:””, shares:””, buyPrice:””, sellPrice:””, sold:false, buyDate:”” };

function PortfolioPanel({ onClose, allStocks }) {
const [lots, setLots]           = useState([]);
const [newLot, setNewLot]       = useState({…EMPTY_LOT});
const [storageReady, setReady]  = useState(false);
const [saved, setSaved]         = useState(false);
const [activeTab, setTab]       = useState(“holdings”);
const [ratings, setRatings]     = useState(null);
const [diagLoading, setDiagLoading] = useState(false);
const { text: diagText, going: diagGoing, play: diagPlay } = useTypewriter();

// טעינה
useEffect(() => {
try {
const s = localStorage.getItem(“sr_lots_v5”);
setLots(s ? JSON.parse(s) : DEFAULT_LOTS);
} catch { setLots(DEFAULT_LOTS); }
setReady(true);
}, []);

// שמירה
useEffect(() => {
if (!storageReady) return;
try { localStorage.setItem(“sr_lots_v5”, JSON.stringify(lots)); setSaved(true); setTimeout(()=>setSaved(false),1500); } catch {}
}, [lots, storageReady]);

// קבל מחיר נוכחי לטיקר
const currentPrice = t => allStocks[t.toUpperCase()]?.price ?? null;

// זיהוי האם מניה “חוזרת” — כבר הייתה ממנה עסקה קודמת שנמכרה
const soldTickers = new Set(lots.filter(l=>l.sold).map(l=>l.ticker.toUpperCase()));

// קיבוץ לוטים לפי טיקר (רק פעילים)
const activeLots  = lots.filter(l => !l.sold);
const soldLots    = lots.filter(l => l.sold);

// סטטיסטיקות לכל לוט
const enrichLot = lot => {
const price = currentPrice(lot.ticker);
const cost  = lot.buyPrice * lot.shares;
if (lot.sold) {
const realizedPnl    = (lot.sellPrice - lot.buyPrice) * lot.shares;
const realizedPnlPct = ((lot.sellPrice - lot.buyPrice) / lot.buyPrice) * 100;
return { …lot, cost, realizedPnl, realizedPnlPct, price: lot.sellPrice };
}
const value   = price ? price * lot.shares : null;
const pnl     = value !== null ? value - cost : null;
const pnlPct  = cost > 0 && pnl !== null ? (pnl/cost)*100 : null;
const isRepeat = soldTickers.has(lot.ticker.toUpperCase());
return { …lot, price, value, cost, pnl, pnlPct, isRepeat };
};

const enrichedActive = activeLots.map(enrichLot);
const enrichedSold   = soldLots.map(enrichLot);

const totalValue = enrichedActive.reduce((a,h)=>a+(h.value??h.cost),0);
const totalCost  = enrichedActive.reduce((a,h)=>a+h.cost,0);
const totalPnL   = totalValue - totalCost;
const totalPct   = totalCost>0?(totalPnL/totalCost)*100:0;
const totalRealized = enrichedSold.reduce((a,h)=>a+h.realizedPnl,0);

const addLot = () => {
if (!newLot.ticker || !newLot.shares || !newLot.buyPrice) return;
const t = newLot.ticker.toUpperCase().trim();
const nextId = Math.max(0, …lots.map(l=>l.id)) + 1;
setLots(p => […p, {
id: nextId,
ticker: t,
shares: parseFloat(newLot.shares)||0,
buyPrice: parseFloat(newLot.buyPrice)||0,
sellPrice: newLot.sold && newLot.sellPrice ? parseFloat(newLot.sellPrice) : null,
sold: newLot.sold,
buyDate: newLot.buyDate || new Date().toISOString().slice(0,10)
}]);
setNewLot({…EMPTY_LOT});
};

const removeLot = id => setLots(p => p.filter(l=>l.id!==id));

const markSold = (id, sellPrice) => {
setLots(p => p.map(l => l.id===id ? {…l, sold:true, sellPrice:parseFloat(sellPrice)||0} : l));
};

const runDiagnosis = async () => {
setDiagLoading(true); setTab(“analysis”); setRatings(null);
const lines = enrichedActive.map(h =>
`${h.ticker}: ${h.shares.toLocaleString()} מניות, עלות $${h.buyPrice}, מחיר ${h.price?`$${h.price.toFixed(2)}`:"?"}, P&L: ${h.pnlPct!==null?h.pnlPct.toFixed(1)+"%":"N/A"}${h.isRepeat?" [קניה חוזרת]":""}`
).join(”\n”);
try {
const jsonTxt = await callClaude(`אנליסט השקעות — נתח תיק, החזר JSON בלבד:\n${lines}\n[\n{"ticker":"XXX","action":"BUY"|"HOLD"|"SELL","score":1-10,"reason":"עד 8 מילים בעברית"}\n]\nBUY=הגדל, HOLD=החזק, SELL=מכור`);
try { setRatings(JSON.parse(jsonTxt.replace(/`json|`/g,””).trim())); } catch {}
const txt = await callClaude(`אבחן תיק בעברית:\n${lines}\nסה"כ: $${totalValue.toFixed(0)}, P&L: ${totalPnL>=0?"+":""}${totalPct.toFixed(1)}%, הפסד ממומש: $${totalRealized.toFixed(0)}\n3 פסקאות ישירות: מצב, מבטיחות, למכור`);
diagPlay(txt);
} catch { diagPlay(“שגיאה.”); }
setDiagLoading(false);
};

const diagBusy = diagLoading || diagGoing;
const [sellInput, setSellInput] = useState({});

const fmtPrice = p => p < 1 ? p.toFixed(4) : p < 10 ? p.toFixed(3) : p.toFixed(2);

return (
<div dir=“rtl” style={{position:“fixed”,top:0,right:0,height:“100vh”,width:“min(680px,100vw)”,background:”#080e1a”,borderLeft:“1px solid rgba(167,139,250,0.2)”,display:“flex”,flexDirection:“column”,zIndex:300,animation:“slideIn 0.3s ease”,boxShadow:”-24px 0 64px rgba(0,0,0,0.7)”,paddingTop:“var(–sat)”}}>

      <div style={{fontSize:"16px",fontWeight:"700",color:"#a78bfa"}}>💼 תיק ההשקעות</div>

function StockCard({ ticker, name, price, change, sector, index, onChart, accent=”#63b3ed”, aRgb=“99,179,237” }) {
const pos = change >= 0;
const fmt = p => p<1?p.toFixed(4):p<10?p.toFixed(3):p.toLocaleString(“en”,{minimumFractionDigits:2,maximumFractionDigits:2});
return (
<div dir=“rtl” style={{background:`rgba(${aRgb},0.03)`,border:`1px solid rgba(${aRgb},0.1)`,borderRadius:“12px”,padding:“13px”,transition:“all 0.2s”,animation:`fadeSlide 0.4s ease ${index*0.04}s both`,cursor:“pointer”}}
onMouseEnter={e=>{e.currentTarget.style.background=`rgba(${aRgb},0.08)`;e.currentTarget.style.borderColor=`rgba(${aRgb},0.3)`;e.currentTarget.style.transform=“translateY(-2px)”;}}
onMouseLeave={e=>{e.currentTarget.style.background=`rgba(${aRgb},0.03)`;e.currentTarget.style.borderColor=`rgba(${aRgb},0.1)`;e.currentTarget.style.transform=””;}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,marginBottom:“10px”}}>
<div>
<div style={{display:“flex”,alignItems:“center”,gap:“6px”,marginBottom:“2px”}}>
<span style={{fontFamily:“monospace”,fontSize:“14px”,fontWeight:“700”,color:accent}}>{ticker}</span>
{sector&&<span style={{fontSize:“9px”,padding:“1px 5px”,background:`rgba(${aRgb},0.12)`,borderRadius:“20px”,color:“rgba(255,255,255,0.45)”}}>{sector}</span>}
</div>
<div style={{fontSize:“11px”,color:“rgba(255,255,255,0.4)”}}>{name}</div>
</div>
<div style={{textAlign:“left”}}>
<div style={{fontSize:“16px”,fontWeight:“700”,fontFamily:“monospace”,color:”#f7fafc”}}>${fmt(price)}</div>
<div style={{fontSize:“11px”,fontWeight:“600”,color:pos?”#68d391”:”#fc8181”,fontFamily:“monospace”}}>{pos?“▲”:“▼”}{Math.abs(change).toFixed(2)}%</div>
</div>
</div>
<button onClick={()=>onChart({ticker,name,price,change,sector})} style={{width:“100%”,padding:“7px”,background:`rgba(${aRgb},0.1)`,border:`1px solid rgba(${aRgb},0.22)`,borderRadius:“7px”,color:accent,fontSize:“12px”,cursor:“pointer”}}
onMouseEnter={e=>e.currentTarget.style.background=`rgba(${aRgb},0.2)`}
onMouseLeave={e=>e.currentTarget.style.background=`rgba(${aRgb},0.1)`}>
📊 ניתוח גרף + AI ←
</button>
</div>
);
}

function SectionLabel({label,color,rgb}){return(<div style={{display:“flex”,alignItems:“center”,gap:“10px”,marginBottom:“10px”}}><span style={{fontSize:“11px”,color,fontWeight:“600”,whiteSpace:“nowrap”}}>{label}</span><div style={{height:“1px”,flex:1,background:`rgba(${rgb},0.15)`}}/></div>);}
