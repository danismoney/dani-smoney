@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#060b14;color:#f7fafc;font-family:Heebo,system-ui,sans-serif;overscroll-behavior:none}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(99,179,237,.2);border-radius:4px}
input:focus{outline:none}input::placeholder{color:rgba(255,255,255,.25)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes sIn{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
/* keys screen */
#keys{display:none;position:fixed;inset:0;background:#060b14;z-index:9999;align-items:center;justify-content:center;padding:20px;padding-top:max(var(--sat),24px)}
.kbox{width:min(420px,100%);background:#0d1625;border:1px solid rgba(99,179,237,.2);border-radius:16px;padding:28px}
.kinp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 40px 10px 12px;color:#f7fafc;font-size:13px;font-family:monospace}
.kbtn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(99,179,237,.3),rgba(167,139,250,.25));border:1px solid rgba(99,179,237,.4);border-radius:10px;color:#f7fafc;font-size:15px;cursor:pointer;font-weight:700;font-family:Heebo,sans-serif;margin-top:4px}
.kerr{display:none;color:#fc8181;font-size:12px;margin:10px 0;text-align:center;padding:8px;background:rgba(252,129,129,.08);border-radius:8px}
</style>
</head>
<body>

<!-- API Key Screen -->

<div id="keys" style="display:flex;display:none">
  <div class="kbox">
    <div style="font-size:24px;font-weight:700;margin-bottom:4px">💰 Dani's Money</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:22px">המפתח נשמר בדפדפן שלך בלבד</div>
    <div style="margin-bottom:18px">
      <label style="font-size:11px;color:rgba(255,255,255,.5);display:block;margin-bottom:6px">
        🤖 Anthropic API Key
        <a href="https://console.anthropic.com" target="_blank" style="color:#63b3ed;margin-right:8px;font-size:10px">קבל כאן ←</a>
      </label>
      <div style="position:relative">
        <input id="ia" type="password" class="kinp" placeholder="sk-ant-api03-..."/>
        <button onclick="tv('ia','ea')" id="ea" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:rgba(255,255,255,.4)">👁</button>
      </div>
    </div>
    <div id="kerr" class="kerr"></div>
    <button class="kbtn" onclick="saveKey()">שמור והפעל ←</button>
    <div style="font-size:10px;color:rgba(255,255,255,.2);text-align:center;line-height:1.7;margin-top:12px">
      🔒 נשמר ב-localStorage בלבד · לא נשלח לשום שרת חיצוני
    </div>
  </div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
function tv(a,b){var i=document.getElementById(a),btn=document.getElementById(b);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
function saveKey(){
  var a=document.getElementById('ia').value.trim();
  var err=document.getElementById('kerr');err.style.display='none';
  if(!a.startsWith('sk-ant')){err.style.display='block';err.textContent='⚠️ Key חייב להתחיל ב-sk-ant';return;}
  localStorage.setItem('dm_ak',a);
  document.getElementById('keys').style.display='none';
  mountApp();
}
window.clearKeys=function(){localStorage.removeItem('dm_ak');location.reload();};
var mounted=false;
function mountApp(){if(mounted)return;mounted=true;document.dispatchEvent(new Event('boot'));}
window.addEventListener('DOMContentLoaded',function(){
  var a=localStorage.getItem('dm_ak');
  if(a&&a.startsWith('sk-ant')){mountApp();}
  else{document.getElementById('keys').style.display='flex';}
});
</script>

<script type="text/babel">
(function(){
  var booted=false;
  document.addEventListener('boot',function(){if(booted)return;booted=true;run();});
  if(localStorage.getItem('dm_ak')){setTimeout(function(){if(!booted){booted=true;run();}},200);}

  function run(){
    const{useState,useEffect,useRef,useCallback}=React;
    const AKEY=()=>localStorage.getItem('dm_ak')||'';
    const fmt=p=>p==null?'—':p<1?p.toFixed(4):p<10?p.toFixed(3):p.toFixed(2);

    async function ai(prompt){
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':AKEY(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
      });
      const d=await r.json();
      if(d.error)throw new Error(d.error.message);
      return(d.content&&d.content[0]&&d.content[0].text)||'';
    }

    async function getPrice(ticker){
      try{
        const proxy='https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1d');
        const r=await fetch(proxy);const j=await r.json();
        const meta=JSON.parse(j.contents)?.chart?.result?.[0]?.meta;
        if(meta&&meta.regularMarketPrice>0){const price=meta.regularMarketPrice,prev=meta.chartPreviousClose||price;return{price,change:((price-prev)/prev)*100};}
      }catch(e){}
      return null;
    }

    function useTW(){
      const[text,set]=useState('');const[on,setOn]=useState(false);const t=useRef();
      const play=useCallback(s=>{clearInterval(t.current);set('');setOn(true);let i=0;t.current=setInterval(()=>{i+=3;if(i>=s.length){set(s);setOn(false);clearInterval(t.current);}else set(s.slice(0,i));},16);},[]);
      useEffect(()=>()=>clearInterval(t.current),[]);
      return{text,on,play};
    }

    const DB={
      SMX:{n:'SMX Security Matters',p:4.35,c:-11.59,s:'ביטחון',sec:'my'},
      PGY:{n:'Pagaya Technologies',p:14.32,c:-4.98,s:'פינטק',sec:'my'},
      QUBT:{n:'Quantum Computing',p:9.41,c:-4.27,s:'קוואנטום',sec:'my'},
      BYND:{n:'Beyond Meat',p:1.045,c:-9.91,s:'מזון',sec:'my'},
      LUMN:{n:'Lumen Technologies',p:8.73,c:0.69,s:'תקשורת',sec:'my'},
      MNDY:{n:'monday.com',p:67.86,c:-0.80,s:'SaaS',sec:'my'},
      TSLA:{n:'Tesla Inc.',p:386.42,c:-1.55,s:'רכב',sec:'cmp'},
      AAPL:{n:'Apple Inc.',p:266.17,c:-2.52,s:'טכנולוגיה',sec:'cmp'},
      NVDA:{n:'NVIDIA',p:199.88,c:-1.08,s:'מוליכים',sec:'cmp'},
      MSFT:{n:'Microsoft',p:424.16,c:1.46,s:'טכנולוגיה',sec:'cmp'},
      META:{n:'Meta Platforms',p:668.84,c:-0.31,s:'טכנולוגיה',sec:'cmp'},
      AMZN:{n:'Amazon',p:249.91,c:0.66,s:'ענן',sec:'cmp'},
      GOOG:{n:'Alphabet',p:330.47,c:-1.47,s:'טכנולוגיה',sec:'cmp'},
      LI:{n:'Li Auto',p:18.50,c:-1.12,s:'EV סין',sec:'cmp'},
      BX:{n:'Blackstone',p:128.50,c:-0.38,s:'פיננסים',sec:'cmp'},
      APP:{n:'AppLovin',p:473.18,c:-3.62,s:'טכנולוגיה',sec:'wtch',ws:8,wn:'צמיחה חזקה בפרסום'},
      SEDG:{n:'SolarEdge Tech',p:40.57,c:1.88,s:'אנרגיה',sec:'wtch',ws:8,wn:'פוטנציאל חזרה חזק'},
      AUID:{n:'authID Inc.',p:1.27,c:7.63,s:'אבטחה',sec:'wtch',ws:7,wn:'ביקוש גבוה לאבטחת AI'},
      LCID:{n:'Lucid Group',p:7.11,c:5.33,s:'EV',sec:'wtch',ws:7,wn:'מומנטום עולה'},
      ET:{n:'Energy Transfer',p:18.96,c:0.26,s:'אנרגיה',sec:'wtch',ws:7,wn:'דיבידנד גבוה ויציב'},
      OPEN:{n:'Opendoor Tech',p:5.45,c:1.87,s:'נדלן',sec:'wtch',ws:7,wn:'שוק נדלן מתאושש'},
      SMCI:{n:'Super Micro Computer',p:28.43,c:-1.32,s:'שרתים',sec:'wtch',ws:5,wn:'תלוי דוחות קרובים'},
      NIO:{n:'NIO Inc.',p:6.43,c:-3.45,s:'EV סין',sec:'wtch',ws:5,wn:'תלוי מדיניות סינית'},
      INTC:{n:'Intel',p:21.65,c:0.85,s:'מוליכים',sec:'wtch',ws:5,wn:'מבנה מחדש בתהליך'},
      MBLY:{n:'Mobileye',p:7.87,c:-2.11,s:'אוטונומי',sec:'wtch',ws:5,wn:'לחץ תחרותי'},
      PTON:{n:'Peloton',p:5.00,c:-3.47,s:'כושר',sec:'wtch',ws:4,wn:'מאבק לחזרה לצמיחה'},
      OTLK:{n:'Outlook Therapeutics',p:0.3194,c:-13.68,s:'ביוטק',sec:'wtch',ws:2,wn:'ירידה חדה, סיכון גבוה'},
      BIRD:{n:'Allbirds',p:8.50,c:-22.87,s:'אופנה',sec:'wtch',ws:1,wn:'פשיטת רגל אפשרית'},
      OGEN:{n:'Oragenics',p:0.66,c:-6.65,s:'ביוטק',sec:'wtch',ws:1,wn:'מניית פרוטה'},
      ENVB:{n:'Enveric Biosciences',p:3.37,c:-7.67,s:'ביוטק',sec:'wtch',ws:2,wn:'הון עצמי שלילי'},
      BAESY:{n:'BAE Systems',p:116.05,c:-5.07,s:'ביטחון',sec:'wtch',ws:3,wn:'ירידה בתקציבים'},
    };

    function mkC(ticker,base){
      let s=ticker.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*997;
      const r=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
      const o=[];let p=base*(0.86+r()*0.05);
      for(let i=0;i<60;i++){const op=p,cl=op*(1+(r()-0.465)*(0.013+r()*0.022));o.push({o:op,c:cl,h:Math.max(op,cl)*(1+r()*0.008),l:Math.min(op,cl)*(1-r()*0.008)});p=cl;}
      return o;
    }
    function sma(c,n){return c.map((_,i)=>i<n-1?null:c.slice(i-n+1,i+1).reduce((a,x)=>a+x.c,0)/n);}
    function rsi14(c){const g=[],l=[];for(let i=1;i<c.length;i++){const d=c[i].c-c[i-1].c;g.push(d>0?d:0);l.push(d<0?-d:0);}return c.map((_,i)=>{if(i<14)return null;const gv=g.slice(i-14,i).reduce((a,b)=>a+b,0)/14,lv=l.slice(i-14,i).reduce((a,b)=>a+b,0)/14;return lv===0?100:100-100/(1+gv/lv);});}
    function lvls(c){return{r:Math.max(...c.slice(-30).map(x=>x.h)),s:Math.min(...c.slice(-30).map(x=>x.l))};}

    function CandleChart({cs,price}){
      const ref=useRef();const[tip,setTip]=useState(null);
      const W=540,H=170,PD={t:6,r:38,b:20,l:44},cw=W-PD.l-PD.r,ch=H-PD.t-PD.b;
      const all=cs.flatMap(c=>[c.h,c.l]);
      const mn=Math.min(...all)*.997,mx=Math.max(...all)*1.003,rng=mx-mn;
      const tx=i=>PD.l+(i/(cs.length-1))*cw,ty=p=>PD.t+ch-((p-mn)/rng)*ch;
      const s20=sma(cs,20),s50=sma(cs,50),lv=lvls(cs);
      const bw=Math.max(2,(cw/cs.length)*.65);
      const pt=arr=>arr.map((v,i)=>v==null?'':`${i===arr.findIndex(x=>x!=null)?'M':'L'}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
      const gps=[0,1,2,3,4].map(i=>mn+(rng*i)/4);
      return(
        <svg ref={ref} width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible',cursor:'crosshair'}}
          onMouseMove={e=>{const rc=ref.current.getBoundingClientRect();const mx=(e.clientX-rc.left)*(W/rc.width);const idx=Math.round(((mx-PD.l)/cw)*(cs.length-1));if(idx>=0&&idx<cs.length){const c=cs[idx];setTip({idx,...c,y:ty(c.c)});}}}
          onMouseLeave={()=>setTip(null)}>
          {gps.map((p,i)=><g key={i}><line x1={PD.l} y1={ty(p)} x2={W-PD.r} y2={ty(p)} stroke="rgba(255,255,255,.04)"/><text x={PD.l-3} y={ty(p)+4} textAnchor="end" fontSize="9" fill="rgba(255,255,255,.22)" fontFamily="monospace">{fmt(p)}</text></g>)}
          <line x1={PD.l} y1={ty(lv.r)} x2={W-PD.r} y2={ty(lv.r)} stroke="rgba(252,129,129,.5)" strokeWidth="1" strokeDasharray="5,4"/>
          <text x={W-PD.r+2} y={ty(lv.r)+4} fontSize="8" fill="rgba(252,129,129,.6)" fontFamily="monospace">{fmt(lv.r)}</text>
          <line x1={PD.l} y1={ty(lv.s)} x2={W-PD.r} y2={ty(lv.s)} stroke="rgba(104,211,145,.5)" strokeWidth="1" strokeDasharray="5,4"/>
          <text x={W-PD.r+2} y={ty(lv.s)+4} fontSize="8" fill="rgba(104,211,145,.6)" fontFamily="monospace">{fmt(lv.s)}</text>
          {cs.map((c,i)=>{const x=tx(i),up=c.c>=c.o,col=up?'#68d391':'#fc8181';return(<g key={i}><line x1={x} y1={ty(c.h)} x2={x} y2={ty(c.l)} stroke={col} strokeWidth=".8" opacity=".8"/><rect x={x-bw/2} y={ty(Math.max(c.o,c.c))} width={bw} height={Math.max(1.5,Math.abs(ty(c.o)-ty(c.c)))} fill={col} opacity={tip&&tip.idx===i?1:.82}/></g>);})}
          <path d={pt(s20)} fill="none" stroke="#63b3ed" strokeWidth="1.5" opacity=".85"/>
          <path d={pt(s50)} fill="none" stroke="#f6ad55" strokeWidth="1.5" opacity=".85"/>
          <line x1={PD.l} y1={ty(price)} x2={W-PD.r} y2={ty(price)} stroke="rgba(255,255,255,.2)" strokeWidth="1" strokeDasharray="3,3"/>
          {tip&&<g><circle cx={tx(tip.idx)} cy={tip.y} r="3" fill="#63b3ed"/><rect x={Math.min(tx(tip.idx)+5,W-88)} y={tip.y-34} width="84" height="42" rx="5" fill="rgba(8,14,26,.96)" stroke="rgba(99,179,237,.25)"/><text x={Math.min(tx(tip.idx)+9,W-84)} y={tip.y-21} fontSize="9" fill="rgba(255,255,255,.5)" fontFamily="monospace">פ: {fmt(tip.o)}</text><text x={Math.min(tx(tip.idx)+9,W-84)} y={tip.y-10} fontSize="9" fill="rgba(255,255,255,.5)" fontFamily="monospace">ס: {fmt(tip.c)}</text><text x={Math.min(tx(tip.idx)+9,W-84)} y={tip.y+1} fontSize="9" fill={tip.c>=tip.o?'#68d391':'#fc8181'} fontFamily="monospace">{tip.c>=tip.o?'▲':'▼'}{Math.abs((tip.c-tip.o)/tip.o*100).toFixed(2)}%</text></g>}
        </svg>
      );
    }

    function RSIBar({cs}){
      const W=540,H=40,PD={t:2,r:38,b:10,l:44},cw=W-PD.l-PD.r,ch=H-PD.t-PD.b;
      const rs=rsi14(cs),tx=i=>PD.l+(i/(cs.length-1))*cw,ty=v=>PD.t+ch-(v/100)*ch;
      const pt=rs.map((v,i)=>v==null?'':`${i===rs.findIndex(x=>x!=null)?'M':'L'}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
      const last=rs.filter(Boolean).pop()||50,col=last>70?'#fc8181':last<30?'#68d391':'#63b3ed';
      return(<div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'2px'}}>
          <span style={{fontSize:'10px',color:'rgba(255,255,255,.3)'}}>RSI(14)</span>
          <span style={{fontSize:'11px',fontWeight:'700',color:col,fontFamily:'monospace'}}>{last.toFixed(1)} — {last>70?'קנוי יתר':last<30?'מכור יתר':'נייטרל'}</span>
        </div>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
          {[70,50,30].map(v=><g key={v}><line x1={PD.l} y1={ty(v)} x2={W-PD.r} y2={ty(v)} stroke={v===50?'rgba(255,255,255,.05)':v===70?'rgba(252,129,129,.2)':'rgba(104,211,145,.2)'} strokeWidth="1" strokeDasharray={v!==50?'4,3':'none'}/></g>)}
          <path d={pt} fill="none" stroke={col} strokeWidth="1.5" opacity=".9"/>
        </svg>
      </div>);
    }

    function Drawer({onClose,border,children}){
      return React.createElement(React.Fragment,null,
        React.createElement('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:250},onClick:onClose}),
        React.createElement('div',{dir:'rtl',style:{position:'fixed',top:0,right:0,height:'100dvh',width:'min(660px,100vw)',background:'#080e1a',borderLeft:'1px solid '+border,display:'flex',flexDirection:'column',zIndex:300,animation:'sIn .28s ease',boxShadow:'-20px 0 60px rgba(0,0,0,.7)',paddingTop:'max(env(safe-area-inset-top,0px),44px)'}},children)
      );
    }
    function CloseBtn({onClick}){return React.createElement('button',{onClick,style:{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.18)',color:'#f7fafc',cursor:'pointer',padding:'6px 14px',borderRadius:'8px',fontSize:'13px',fontWeight:'600'}},'✕ סגור');}

    function ChartDrawer({stock,onClose,liveMap}){
      const{text,on,play}=useTW();const[ld,setLd]=useState(false);
      const live=liveMap[stock.ticker];
      const price=live?live.price:stock.p,change=live?live.change:stock.c;
      const cs=mkC(stock.ticker,price),lv=lvls(cs),lastRsi=rsi14(cs).filter(Boolean).pop()||50;
      const run=useCallback(async()=>{
        setLd(true);
        try{play(await ai('נתח '+stock.ticker+' ('+stock.n+') בעברית:\nמחיר: $'+fmt(price)+', שינוי: '+change.toFixed(2)+'%\nתמיכה: $'+fmt(lv.s)+', התנגדות: $'+fmt(lv.r)+', RSI: '+lastRsi.toFixed(1)+'\n3 פסקאות ללא כוכביות: מצב מחיר, אינדיקטורים, תרחיש מסחר'));}
        catch(e){play('שגיאה: '+e.message);}
        setLd(false);
      },[stock.ticker,price]);
      useEffect(()=>{run();},[run]);
      const busy=ld||on;
      return(
        <Drawer onClose={onClose} border="rgba(99,179,237,.2)">
          <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontFamily:'monospace',fontSize:'17px',fontWeight:'700',color:'#63b3ed'}}>{stock.ticker}</span>
              <span style={{fontSize:'11px',color:'rgba(255,255,255,.4)'}}>{stock.n}</span>
              <span style={{fontSize:'12px',fontWeight:'700',color:change>=0?'#68d391':'#fc8181',fontFamily:'monospace'}}>{change>=0?'▲':'▼'}{Math.abs(change).toFixed(2)}%</span>
              {live&&<span style={{fontSize:'8px',color:'#68d391',background:'rgba(104,211,145,.1)',padding:'1px 5px',borderRadius:'4px'}}>●LIVE</span>}
            </div>
            <CloseBtn onClick={onClose}/>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'7px',marginBottom:'10px'}}>
              {[{l:'תמיכה',v:'$'+fmt(lv.s),col:'#68d391'},{l:'מחיר',v:'$'+fmt(price),col:'#f7fafc'},{l:'התנגדות',v:'$'+fmt(lv.r),col:'#fc8181'}].map(x=>(
                <div key={x.l} style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'9px',padding:'8px',textAlign:'center'}}>
                  <div style={{fontSize:'9px',color:'rgba(255,255,255,.3)',marginBottom:'2px'}}>{x.l}</div>
                  <div style={{fontSize:'13px',fontWeight:'700',color:x.col,fontFamily:'monospace'}}>{x.v}</div>
                </div>
              ))}
