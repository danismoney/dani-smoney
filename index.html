function saveKey(){

}
window.clearKeys=function(){localStorage.removeItem('dm_akey');location.reload();};

  var a=localStorage.getItem('dm_akey');
  if(a&&a.startsWith('sk-ant')){bootApp();}
  else{document.getElementById('keys-screen').style.display='flex';}
});

var booted=false;
function bootApp(){
  if(booted)return;booted=true;
  /* Babel כבר טעון — הפעל את ה-script */
  setTimeout(function(){
    var scripts=document.querySelectorAll('script[type="text/babel"]');
    scripts.forEach(function(s){if(!s.dataset.ran){s.dataset.ran='1';Babel.transformScriptTags();}});
  },50);
}

/* ── timeout ── */
function withTimeout(p,ms){return new Promise(function(res,rej){var t=setTimeout(function(){rej('timeout');},ms);p.then(function(v){clearTimeout(t);res(v);},function(e){clearTimeout(t);rej(e);});});}

/* ── live price ── */
async function fetchLive(ticker){
  try{
    var url='https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1d';
    var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
    var r=await withTimeout(fetch(proxy),8000);
    if(!r.ok)return null;
    var j=await r.json();
    var body=j.contents?JSON.parse(j.contents):j;
    var meta=body&&body.chart&&body.chart.result&&body.chart.result[0]&&body.chart.result[0].meta;
    if(meta&&meta.regularMarketPrice>0){
      var price=meta.regularMarketPrice,prev=meta.chartPreviousClose||price;
      return{price:price,change:((price-prev)/prev)*100};
    }
  }catch(e){}
  return null;
}
async function fetchAllLive(tickers){
  var res=await Promise.allSettled(tickers.map(function(t){return fetchLive(t);}));
  var map={};
  tickers.forEach(function(t,i){if(res[i].status==='fulfilled'&&res[i].value)map[t]=res[i].value;});
  return map;
}

async function askClaude(prompt){
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':AKEY(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:prompt}]})
  });
  var d=await r.json();
  return(d.content&&d.content[0]&&d.content[0].text)||'';
}

/* ── typewriter ── */
function useTypewriter(){
  var _t=useState(''),text=_t[0],setText=_t[1];
  var _g=useState(false),going=_g[0],setGoing=_g[1];
  var iv=useRef(null);

    iv.current=setInterval(function(){i+=3;if(i>=full.length){setText(full);setGoing(false);clearInterval(iv.current);}else setText(full.slice(0,i));},16);
  },[]);
  useEffect(function(){return function(){clearInterval(iv.current);};},[]);

function seededRand(seed){var s=seed;return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

  var hash=ticker.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0);
  var rnd=seededRand(hash*997),out=[],p=base*(0.86+rnd()*0.05);
  for(var i=0;i<60;i++){var open=p,close=open*(1+(rnd()-0.465)*(0.013+rnd()*0.022));out.push({open:open,close:close,high:Math.max(open,close)*(1+rnd()*0.008),low:Math.min(open,close)*(1-rnd()*0.008)});p=close;}
  return out;
}
function calcSMA(c,n){return c.map(function(_,i){return i<n-1?null:c.slice(i-n+1,i+1).reduce(function(a,x){return a+x.close;},0)/n;});}
function calcRSI(c,n){n=n||14;var g=[],l=[];for(var i=1;i<c.length;i++){var d=c[i].close-c[i-1].close;g.push(d>0?d:0);l.push(d<0?-d:0);}return c.map(function(_,i){if(i<n)return null;var gv=g.slice(i-n,i).reduce(function(a,b){return a+b;},0)/n,lv=l.slice(i-n,i).reduce(function(a,b){return a+b;},0)/n;return lv===0?100:100-100/(1+gv/lv);});}
